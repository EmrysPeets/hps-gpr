# Small combined-scan test config (2015+2016) with overlap and non-overlap masses.
# Non-overlap example: 0.034 GeV (2015 only)
# Overlap examples:   0.035, 0.036 GeV (2015+2016)

path_2015: "/sdf/home/e/epeets/move/2015_IMD.root"
path_2016: "/sdf/home/e/epeets/move/EventSelection_Data_10Percent.root"

hist_2015: "invariant_mass"
hist_2016: "h_Minv_General_Final_1"

enable_2015: true
enable_2016: true
enable_2021: false

do_combined: true
mass_step_gev: 0.001

# Keep runtime reasonable for quick validation
scan_parallel: false
scan_threads_per_worker: 1
n_restarts: 4

cls_mode: "asymptotic"

save_plots: true
save_fit_json: true
save_per_mass_folders: true

output_dir: "outputs/test_combined_2015_2016_small"
